<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🌍 YIS - منصة يوسف الاستخباراتي النهائية</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

<div class="container">
  <header>
    <h1>🌍 YIS - منصة يوسف الاستخباراتي النهائية</h1>
  </header>

  <aside class="sidebar">
    <h2>🧠 القائمة</h2>
    <ul>
      <li onclick="scrollToSection('news')">📡 الأخبار</li>
      <li onclick="scrollToSection('war')">🔥 مؤشر الحرب</li>
      <li onclick="scrollToSection('strategy')">🧠 التحليل</li>
      <li onclick="scrollToSection('alerts')">🚨 التنبيهات</li>
      <li onclick="scrollToSection('mapSection')">🗺️ خريطة النزاعات</li>
      <li onclick="scrollToSection('liveNews')">📺 بث مباشر</li>
    </ul>
  </aside>

  <main>
    <section id="news">
      <h2>📡 الأخبار العالمية</h2>
      <div id="newsContainer"></div>
    </section>

    <section id="war">
      <h2>🔥 مؤشر الحرب</h2>
      <button onclick="runWarIndex()">تحليل</button>
      <p id="warResult"></p>
    </section>

    <section id="strategy">
      <h2>🧠 التحليل الاستراتيجي</h2>
      <button onclick="runStrategy()">تشغيل</button>
      <div id="strategyContainer"></div>
    </section>

    <section id="alerts">
      <h2>🚨 التنبيهات</h2>
      <div id="alertsContainer"></div>
    </section>

    <section id="mapSection">
      <h2>🗺️ خريطة النزاعات</h2>
      <div id="map" style="height:600px;"></div>
    </section>

    <section id="liveNews">
      <h2>📺 الأخبار المباشرة</h2>
      <div class="newsChannels">
        <h3>العالمية</h3>
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UC16niRr50-MSBwiO3YDb3RA" frameborder="0" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCt8k3wtdEX8jrhBd3Q7t5ZQ" frameborder="0" allowfullscreen></iframe>

        <h3>العربية</h3>
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UC-7Z5D-Rz-9h3F5UuVjrD2g" frameborder="0" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCNx8Fj0iD0oP5w5h5xJ2v0Q" frameborder="0" allowfullscreen></iframe>
      </div>
    </section>
  </main>
</div>

<audio id="alertSound" src="sounds/alert.mp3" preload="auto"></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
