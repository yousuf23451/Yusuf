<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>YOUSIF MONITOR | مركز العمليات الاستراتيجي</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="safe-mode">

    <audio id="siren" src="https://www.soundjay.com/buttons/beep-01a.mp3" loop></audio>

    <header class="main-header">
        <div class="logo-section">
            <span class="status-dot"></span>
            <strong>YOUSIF MONITOR</strong> <small>V6.0 FINAL</small>
        </div>
        
        <div class="actions">
            <button onclick="triggerEmergency()" id="emergency-btn">EMERGENCY MODE</button>
            <button onclick="window.print()" class="report-btn">تصدير تقرير</button>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <div id="intel-log">
        > نظام الرصد نشط... الأقمار الصناعية في وضع المزامنة...
    </div>

    <div class="main-container">
        <div id="map"></div>

        <aside class="news-sidebar">
            <div class="stream-card">
                <div class="label">الجزيرة مباشر</div>
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UCB2hU9zQkSokg1-h5y_NfTw" allowfullscreen></iframe>
            </div>
            <div class="stream-card">
                <div class="label">العربية مباشر</div>
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UCahmwUhMD1yApcJTiDpe-BQ" allowfullscreen></iframe>
            </div>
            <div class="stream-card">
                <div class="label">RT Arabic</div>
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UC7ffIn6-ZfV6_a1396q7-yQ" allowfullscreen></iframe>
            </div>
        </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
