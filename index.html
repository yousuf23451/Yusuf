<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUSIF INTEL | خارطة الانتشار العسكري</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="intel-header">
        <div class="header-main">
            <span class="pulse-status"></span>
            <h1>مركز رصد يوسف خطاب <small>| النسخة العسكرية</small></h1>
        </div>
        <div class="header-actions">
            <button onclick="triggerEmergency()" id="alert-btn">إعلان استنفار 🚨</button>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <div id="map"></div>

    <div class="intel-footer">
        <div class="ticker-label">URGENT</div>
        <marquee>رصد نشاط جوي فوق قاعدة عين الأسد... تحركات بحرية في مضيق هرمز... مراقبة مستمرة لمواقع الحرس الثوري في أصفهان وبندر عباس...</marquee>
    </div>

    <div class="live-feeds">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCB2hU9zQkSokg1-h5y_NfTw"></iframe>
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCahmwUhMD1yApcJTiDpe-BQ"></iframe>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
